# Redis Configuration for DUO Consent Service
# Production-grade settings with persistence

# ============ Network ============
bind 0.0.0.0
port 6379
protected-mode no
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ============ General ============
daemonize no
loglevel notice
databases 16

# ============ Persistence - RDB Snapshots ============
# Save to disk: <seconds> <changes>
# Save if at least 1 key changed in 900 seconds (15 min)
save 900 1
# Save if at least 10 keys changed in 300 seconds (5 min)
save 300 10
# Save if at least 10000 keys changed in 60 seconds (1 min)
save 60 10000

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ============ Persistence - Append Only File (AOF) ============
# AOF provides better durability than RDB alone
appendonly yes
appendfilename "appendonly.aof"

# fsync policy:
# - always: Every write (safest, slowest)
# - everysec: Every second (good balance)
# - no: Let OS decide (fastest, least safe)
appendfsync everysec

# Don't fsync during BGSAVE/BGREWRITEAOF
no-appendfsync-on-rewrite no

# Auto-rewrite AOF when it grows by 100%
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ============ Memory Management ============
# Max memory (adjust based on your server)
# maxmemory 256mb

# Eviction policy when maxmemory is reached
# noeviction - Return errors when memory limit reached
# allkeys-lru - Evict least recently used keys
# volatile-lru - Evict LRU keys with expire set
maxmemory-policy noeviction

# ============ Lazy Freeing ============
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no

# ============ Slow Log ============
# Log queries slower than 10ms
slowlog-log-slower-than 10000
slowlog-max-len 128

# ============ Event Notification ============
# Enable keyspace notifications for pub/sub
# K - Keyspace events
# E - Keyevent events
# g - Generic commands (DEL, EXPIRE, etc.)
# $ - String commands
# h - Hash commands
# s - Set commands
# x - Expired events
notify-keyspace-events "KEghsx"

# ============ Advanced Config ============
hash-max-listpack-entries 512
hash-max-listpack-value 64
list-max-listpack-size -2
set-max-intset-entries 512
zset-max-listpack-entries 128
zset-max-listpack-value 64

# Active defragmentation
activedefrag no

# ============ Security ============
# Uncomment to require password
# requirepass your-strong-password-here

# Disable dangerous commands in production
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command DEBUG ""
# rename-command CONFIG ""
