services:
  redis:
    image: redis:7.2-alpine
    container_name: icarechain-redis
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6391:6379"
    volumes:
      - icarechain-redis-data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - icarechain-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  hardhat:
    build:
      context: .
      dockerfile: docker/Dockerfile.hardhat
    container_name: icarechain-hardhat
    ports:
      - "8559:8545"
    networks:
      - icarechain-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 5s
      timeout: 3s
      retries: 10

  deployer:
    build:
      context: .
      dockerfile: docker/Dockerfile.deployer
    container_name: icarechain-deployer
    depends_on:
      hardhat:
        condition: service_healthy
    environment:
      - HARDHAT_NETWORK=localhost
    volumes:
      - icarechain-deployments:/app/deployments
      - icarechain-abis:/app/api/contracts/abis
    networks:
      - icarechain-net

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: icarechain-api
    ports:
      - "8020:8001"
    environment:
      - RPC_URL=http://hardhat:8545
      - CHAIN_ID=31337
      - RELAYER_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - REDIS_URL=redis://redis:6379
      - CACHE_BACKEND=redis
      - IBIS_PROOF_BACKEND=dev
      - IBIS_PAILLIER_BITS=256
      - ZKP_PRODUCTION_MODE=false
      - AUTH_DEV_MODE=true
    volumes:
      - ./api:/app/api
      - ./circuits:/app/circuits:ro
      - icarechain-deployments:/app/deployments:ro
      - icarechain-abis:/app/api/contracts/abis:ro
    depends_on:
      deployer:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - icarechain-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  icarechain-net:
    driver: bridge

volumes:
  icarechain-deployments:
  icarechain-abis:
  icarechain-redis-data:
    driver: local
